compute_environment: LOCAL_MACHINE
debug: false

deepspeed_config:
  deepspeed_multinode_launcher: standard
  zero_stage: 2            # ← 关键：改为 1
  offload_optimizer_device: none
  offload_param_device: none
  zero3_init_flag: false   # 可留可删，对 Zero-1 无影响

distributed_type: DEEPSPEED
downcast_bf16: "no"
machine_rank: 0
main_training_function: main
mixed_precision: bf16      # 保持 bfloat16
num_machines: 1
num_processes: 1          # 8 张 GPU
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false